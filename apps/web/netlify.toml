# SPA: el workspace correcto es @vantix/web (no @financial-ia/web; ese nombre no existe).
# Build desde la raíz del monorepo: npm install en la raíz resuelve workspaces.
#
# En el panel de Netlify, deja "Base directory" vacío (raíz del repo) o alinea el comando con esto.
# Si el UI sigue forzando otro comando, bórralo en Site settings → Build & deploy para que use este archivo.

[build]
command = "npm run build:web"
publish = "apps/web/dist"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
