services:
  postgres:
    image: postgres:16-alpine
    container_name: financialia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: financialia
      POSTGRES_PASSWORD: financialia
      POSTGRES_DB: financialia
    ports:
      - "5432:5432"
    volumes:
      - financialia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financialia -d financialia"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  financialia_pgdata:
