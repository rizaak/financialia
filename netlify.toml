# Netlify: publicación de la SPA y fallback para React Router.
# Si conectas el repo en Netlify, usa la raíz del monorepo y este archivo.
# Con GitHub Actions el build se hace en CI y solo se sube `apps/web/dist`.

[build]
publish = "apps/web/dist"
command = "npm ci && npm run build:web"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
