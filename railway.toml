# Railway — build desde la raíz del monorepo (conecta el repo en el dashboard).
# Variables de entorno (DATABASE_URL, AUTH0_*, FRONTEND_ORIGIN, etc.) se configuran en Railway.

[build]
# Railpack es el builder por defecto en Railway (Nixpacks está deprecado).
builder = "RAILPACK"
# Railpack instala dependencias en su fase; aquí solo generate + build del API (no repetir npm ci).
buildCommand = "npx prisma generate && npm run build:api"

[deploy]
startCommand = "npm run start:prod -w @financial-ia/api"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
